name: Build Admin APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "SUPABASE_URL=$SUPABASE_URL" > local.properties
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> local.properties
          cat local.properties | sed 's/=.*/=***/'
          ./gradlew assembleDebug -PSUPABASE_URL="$SUPABASE_URL" -PSUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestor360-admin-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
