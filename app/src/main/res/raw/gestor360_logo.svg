<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Patrón que reproduce la bandera cubana, usado como relleno del texto e ícono -->
    <pattern id="flagPattern" patternUnits="userSpaceOnUse" width="600" height="600" x="0" y="0">
      <rect x="0" y="0" width="600" height="600" fill="#002A8F"/>
      <rect x="0" y="120" width="600" height="120" fill="#FFFFFF"/>
      <rect x="0" y="360" width="600" height="120" fill="#FFFFFF"/>
      <polygon points="0,0 0,600 260,300" fill="#C8102E"/>
      <polygon points="105.0,240.0 118.5,281.5 162.1,281.5 126.8,307.1 140.3,348.5 105.0,322.9 69.7,348.5 83.2,307.1 47.9,281.5 91.5,281.5" fill="#FFFFFF"/>
    </pattern>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <clipPath id="roundedIcon">
      <rect x="10" y="10" width="580" height="580" rx="90" ry="90"/>
    </clipPath>
  </defs>

  <!-- Fondo blanco general con esquinas redondeadas tipo icono de app -->
  <rect x="0" y="0" width="600" height="600" rx="96" ry="96" fill="#F4F4F4"/>

  <!-- La bandera completa recortada dentro del icono redondeado, como fondo del logo -->
  <g clip-path="url(#roundedIcon)" opacity="0.16">
    <rect x="10" y="10" width="580" height="580" fill="url(#flagPattern)"/>
  </g>

  <!-- Marco redondeado sutil -->
  <rect x="10" y="10" width="580" height="580" rx="90" ry="90" fill="none" stroke="#002A8F" stroke-width="4" opacity="0.25"/>

  <!-- Texto GESTOR / 360, apilado, relleno con el patrón de la bandera cubana -->
  <g filter="url(#softShadow)">
    <text x="300" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="98" fill="url(#flagPattern)" stroke="#001C5E" stroke-width="3" letter-spacing="2">GESTOR</text>
    <text x="300" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="140" fill="url(#flagPattern)" stroke="#001C5E" stroke-width="3" letter-spacing="4">360</text>
  </g>
</svg>
